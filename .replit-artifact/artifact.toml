kind = "web"
previewPath = "/"
title = "Templates Studio"
version = "1.0.0"
id = "artifacts/templates-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23367

[services.development]
run = "pnpm --filter @workspace/templates-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/templates-studio", "run", "build" ]
publicDir = "artifacts/templates-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23367"
BASE_PATH = "/"
